<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>workit-kit</title>
<script defer src="main.js"></script></head>
<body>
    <div id="content">
        <div class="sidebar">
            <img /> <!--Our Logo here-->
            <h1>V and Bruno</h1>
            <div class="task-categories">
                <div class="upcoming">
                    <h2>Upcoming Tasks:</h2>
                    <div class="today">Today</div>
                    <div class="soon">Soon</div>
                    <div class="someday">Some Day</div>
                    <div class="anytime">Anytime</div>
                </div>
                <!--projects.project1.catTitle-->
                    <!--projects.project1.tasks[0].name-->
            </div>
            <div class="sidebar-options">
                <div class="add-cat">Add Category</div>
                <div class="settings">⚙️</div>
                <div class="modal-space"></div>
            </div>
        </div>
        <div class="main">
            <!--projects.project1.catTitle-->
            <h2 class="task-header">I am a task header</h2>
            <!--projects.project1.catDescription-->
            <div class="task-description">I describe the task</div>
            <div class="task-container"> I contain the tasks
                <!--projects.project1.tasks[0].name-->
                <!--You can click on the task to view it's details-->
                <div class="task-name">I am Task 1</div>
                <div class="subtasks">
                    <!--You can click to scratch it off as complete-->
                    <div class="subtask-description">Subtask towards task</div>
                    <span class="delete-subtask">-</span>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js" defer></script>
</body>
</html>
